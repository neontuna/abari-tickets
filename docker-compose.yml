services:
  app:
    build: .
    env_file: .env
    command: bundle exec puma -p 4567 config.ru
    volumes:
      - .:/app
      - bundle_cache:/usr/local/bundle
      - repairs_data:/app/data
    ports:
      # Reserved for the future Sinatra/Rack web app. Harmless until something
      # is actually listening on 4567 inside the container.
      - "4567:4567"
    devices:
      - "/dev/bus/usb:/dev/bus/usb"
    device_cgroup_rules:
      # USB raw bus (major 189) for libusb. Required so hot-plugged USB
      # devices (e.g. the receipt printer) are usable inside the container,
      # not just devices that were present when the container started.
      - "c 189:* rmw"
    tty: true
    stdin_open: true
    restart: unless-stopped

volumes:
  bundle_cache:
  repairs_data:
